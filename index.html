<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Planteki - Plants</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
  <meta name="theme-color" content="#2E7D32" />
</head>
<body>

<header>
  <h2>Plants</h2>
</header>

<main>
  <div class="card">
    <h3>Add Plant</h3>
    <input type="text" id="plantName" placeholder="Enter plant name" />
    <button onclick="addPlant()">Add</button>
  </div>

  <div class="card">
    <h3>Your Plants</h3>
    <ul id="plantList"></ul>
  </div>
</main>

<nav class="bottom-nav">
  <button class="active-tab">🌿 Plants</button>
  <button onclick="window.location.href='plant-wiki.html'">📚 Plant Wiki</button>
</nav>

<script src="app.js"></script>
<script>
  if('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js').then(()=>console.log('Service Worker Registered'));
  }
</script>
</body>
</html>
